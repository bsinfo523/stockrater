<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockRater – Aktienbewertung</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#141820;--card:#1a2030;--card-h:#1f2840;
  --border:#252d3d;--border-l:#2e3a50;
  --teal:#2a9fa8;--teal-l:#34c4ce;--teal-d:#1a7880;
  --gold:#c9a84c;
  --buy:#4caf82;--buy-bg:#0e2b1f;
  --watch:#c9a84c;--watch-bg:#2a2010;
  --sell:#e05252;--sell-bg:#2b0e0e;
  --text:#e8ecf4;--text-m:#8b95a8;--text-s:#5a6478;
  --r:12px;--rs:8px;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:rgba(13,15,20,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 16px;height:58px;display:flex;align-items:center;gap:12px}
.logo{font-family:'DM Serif Display',serif;font-size:21px;letter-spacing:-.5px;flex-shrink:0}
.logo span{color:var(--teal)}
.header-stats{display:flex;gap:8px;margin-left:auto;flex-shrink:0}
.stat-pill{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--text-m);white-space:nowrap}
.stat-dot{width:6px;height:6px;border-radius:50%}
.stat-dot.buy{background:var(--buy)}.stat-dot.watch{background:var(--watch)}.stat-dot.sell{background:var(--sell)}
.updated-badge{font-size:11px;color:var(--text-s);font-family:'DM Mono',monospace;white-space:nowrap}

/* ── TOOLBAR ── */
.toolbar{max-width:1200px;margin:0 auto;padding:12px 16px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.search-wrap{position:relative;flex:1;min-width:160px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-s);pointer-events:none}
.search-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px 11px 9px 36px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--teal)}
.search-input::placeholder{color:var(--text-s)}
.btn{display:flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface);color:var(--text-m);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn:hover{border-color:var(--teal);color:var(--teal);background:rgba(42,159,168,.06)}
.btn.active{border-color:var(--teal);color:var(--teal);background:rgba(42,159,168,.1)}
.btn-wl.has{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.08)}

/* ── FILTER ROW ── */
.filter-row{max-width:1200px;margin:0 auto;padding:0 16px 10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;color:var(--text-s);flex-shrink:0}
.pill{padding:4px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-m);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.pill:hover{border-color:var(--border-l);color:var(--text)}
.pill.active{border-color:var(--teal);color:var(--teal);background:rgba(42,159,168,.1)}
.pill.buy.active{border-color:var(--buy);color:var(--buy);background:rgba(76,175,130,.1)}
.pill.watch.active{border-color:var(--watch);color:var(--watch);background:rgba(201,168,76,.1)}
.pill.sell.active{border-color:var(--sell);color:var(--sell);background:rgba(224,82,82,.1)}

/* Dropdown-Filter */
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:5px 10px;color:var(--text-m);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;outline:none;transition:border-color .2s;max-width:160px}
.filter-select:focus{border-color:var(--teal)}
.filter-select option{background:var(--surface)}

/* ── RESULTS INFO ── */
.results-info{max-width:1200px;margin:0 auto;padding:0 16px 8px;font-size:13px;color:var(--text-s)}
.results-info strong{color:var(--text-m)}

/* ── STOCK CARD ── */
.stock-list{max-width:1200px;margin:0 auto;padding:0 16px 40px;display:flex;flex-direction:column;gap:7px}
.stock-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;display:grid;grid-template-columns:48px 1fr auto auto auto;align-items:center;gap:12px;cursor:pointer;transition:all .2s;position:relative}
.stock-card:hover{border-color:var(--border-l);background:var(--card-h);transform:translateX(2px)}
.stock-card.buy{border-left:3px solid var(--buy)}
.stock-card.watch{border-left:3px solid var(--watch)}
.stock-card.sell{border-left:3px solid var(--sell)}

.rating-badge{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:17px;font-weight:500;cursor:pointer;flex-shrink:0;position:relative;transition:transform .15s,box-shadow .15s}
.rating-badge:hover{transform:scale(1.1)}
.rating-badge.buy{background:var(--buy-bg);color:var(--buy);border:2px solid var(--buy)}
.rating-badge.watch{background:var(--watch-bg);color:var(--watch);border:2px solid var(--watch)}
.rating-badge.sell{background:var(--sell-bg);color:var(--sell);border:2px solid var(--sell)}
.badge-dot{position:absolute;bottom:-2px;right:-2px;width:13px;height:13px;border-radius:50%;font-size:7px;display:flex;align-items:center;justify-content:center}
.badge-dot.buy{background:var(--buy)}.badge-dot.watch{background:var(--watch)}.badge-dot.sell{background:var(--sell)}

.stock-info{min-width:0}
.stock-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-meta{display:flex;gap:7px;margin-top:3px;align-items:center;flex-wrap:wrap}
.stock-symbol{font-family:'DM Mono',monospace;font-size:11px;color:var(--teal);background:rgba(42,159,168,.1);padding:1px 6px;border-radius:4px}
.stock-sub{font-size:12px;color:var(--text-s)}

/* Kurs + Abstand nebeneinander */
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.metric-price{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.metric-label{font-size:11px;color:var(--text-s)}
.abstand-badge{font-family:'DM Mono',monospace;font-size:12px;padding:2px 8px;border-radius:6px;font-weight:500}
.analyst-badge{font-family:'DM Mono',monospace;font-size:12px;padding:2px 8px;border-radius:6px;font-weight:500}
.analyst-badge.up{background:rgba(76,175,130,.15);color:var(--buy)}
.analyst-badge.dn{background:rgba(224,82,82,.12);color:var(--sell)}
.analyst-badge.flat{background:rgba(139,149,168,.1);color:var(--text-m)}
.analyst-section{padding:0 20px 20px}
.analyst-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.analyst-item{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px}
.analyst-item.full{grid-column:span 2}
.analyst-v{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.analyst-v.up{color:var(--buy)}.analyst-v.dn{color:var(--sell)}
.analyst-l{font-size:11px;color:var(--text-s);margin-top:2px}
.analyst-bar{margin-top:10px;height:6px;background:var(--border);border-radius:3px;position:relative}
.analyst-bar-range{position:absolute;height:100%;border-radius:3px;background:linear-gradient(90deg,rgba(76,175,130,.4),var(--teal))}
.analyst-bar-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:10px;height:10px;border-radius:50%;background:var(--text);border:2px solid var(--bg)}
.analyst-bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-s);margin-top:4px}
.abstand-badge.pos{background:rgba(76,175,130,.15);color:var(--buy)}
.abstand-badge.neu{background:rgba(139,149,168,.1);color:var(--text-m)}
.abstand-badge.neg{background:rgba(224,82,82,.12);color:var(--sell)}

/* Watchlist-Stern */
.wl-btn{background:none;border:none;cursor:pointer;color:var(--text-s);padding:5px;border-radius:6px;transition:all .2s;flex-shrink:0;font-size:18px;line-height:1}
.wl-btn:hover{color:var(--gold)}
.wl-btn.starred{color:var(--gold)}

/* Trend-Badge in Watchlist */
.trend-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:1px 7px;border-radius:10px;margin-left:6px}
.trend-badge.up{background:rgba(76,175,130,.15);color:var(--buy)}
.trend-badge.dn{background:rgba(224,82,82,.12);color:var(--sell)}
.trend-badge.flat{background:rgba(139,149,168,.1);color:var(--text-m)}

/* ── SORT MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border-l);border-radius:var(--r) var(--r) 0 0;padding:22px;width:100%;max-width:520px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-title{font-family:'DM Serif Display',serif;font-size:22px}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text-m);font-size:22px;line-height:1}
.sort-option{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:color .2s}
.sort-option:last-of-type{border-bottom:none}
.sort-option:hover,.sort-option.selected{color:var(--teal)}
.sort-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border-l);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.sort-option.selected .sort-radio{border-color:var(--teal)}
.sort-option.selected .sort-radio::after{content:'';width:10px;height:10px;border-radius:50%;background:var(--teal)}
.modal-btn{width:100%;margin-top:18px;padding:13px;border-radius:var(--r);border:none;background:var(--teal);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.modal-btn:hover{background:var(--teal-l)}


/* ── DETAIL PANEL ── */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300}
.detail-overlay.open{display:block}
.detail-panel{position:fixed;top:0;right:0;width:min(500px,100vw);height:100vh;background:var(--surface);border-left:1px solid var(--border-l);overflow-y:auto;z-index:301;transform:translateX(100%);transition:transform .3s ease}
.detail-panel.open{transform:translateX(0)}

.detail-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px}
.detail-badge{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:21px;font-weight:600;flex-shrink:0}
.detail-badge.buy{background:var(--buy-bg);color:var(--buy);border:2px solid var(--buy)}
.detail-badge.watch{background:var(--watch-bg);color:var(--watch);border:2px solid var(--watch)}
.detail-badge.sell{background:var(--sell-bg);color:var(--sell);border:2px solid var(--sell)}
.detail-name{font-family:'DM Serif Display',serif;font-size:19px;line-height:1.2}
.detail-sub{font-size:13px;color:var(--text-m);margin-top:4px}
.detail-close{background:none;border:none;cursor:pointer;color:var(--text-m);font-size:22px;margin-left:auto;flex-shrink:0}

/* Stats grid */
.detail-stats{padding:14px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;border-bottom:1px solid var(--border)}
.ds{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:11px}
.ds-v{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.ds-l{font-size:11px;color:var(--text-s);margin-top:2px}
.ds-orig{font-size:11px;color:var(--text-s);font-family:'DM Mono',monospace;margin-top:2px}

/* Score bar */
.score-section{padding:14px 20px}
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-s);margin-bottom:8px}
.score-track{height:6px;border-radius:3px;background:var(--border);position:relative}
.score-fill{height:100%;border-radius:3px;transition:width .6s ease}
.score-fill.buy{background:linear-gradient(90deg,var(--teal-d),var(--buy))}
.score-fill.watch{background:linear-gradient(90deg,var(--teal-d),var(--watch))}
.score-fill.sell{background:var(--sell)}
.score-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-s);margin-top:5px}

/* Kennzahlen */
.kz-list{padding:0 20px 14px;display:flex;flex-direction:column;gap:6px}
.kz-row{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;display:flex;align-items:center;gap:11px}
.kz-score{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:600;flex-shrink:0}
.kz-score.p1{background:rgba(76,175,130,.15);color:var(--buy);border:1px solid rgba(76,175,130,.3)}
.kz-score.z0{background:rgba(139,149,168,.1);color:var(--text-m);border:1px solid rgba(139,149,168,.2)}
.kz-score.m1{background:rgba(224,82,82,.12);color:var(--sell);border:1px solid rgba(224,82,82,.3)}
.kz-info{flex:1;min-width:0}
.kz-name{font-size:13px;font-weight:500}
.kz-value{font-size:12px;color:var(--text-m);font-family:'DM Mono',monospace}
.kz-help{font-size:11px;color:var(--text-s);margin-top:2px;line-height:1.4}

/* Hilfe-Toggle */
.help-toggle{font-size:11px;color:var(--teal);cursor:pointer;padding:0 20px 10px;display:inline-block}

/* Kursverlauf */
.history-section{padding:0 20px 20px}
.history-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;transition:border-color .2s}
.history-toggle:hover{border-color:var(--border-l)}
.history-toggle-label{font-size:13px;font-weight:500;flex:1}
.history-chevron{font-size:12px;color:var(--text-s);transition:transform .2s}
.history-chevron.open{transform:rotate(180deg)}
.history-list{display:none;flex-direction:column;gap:4px}
.history-list.open{display:flex}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:7px 11px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);font-size:13px}
.history-date{color:var(--text-s);font-family:'DM Mono',monospace;font-size:12px}
.history-price{font-family:'DM Mono',monospace;font-weight:500}

/* ── PRICE HISTORY MODAL (Watchlist) ── */
.wl-meta{font-size:12px;color:var(--text-s);margin-top:3px}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:60px 20px;color:var(--text-s)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty h3{font-size:17px;color:var(--text-m);margin-bottom:5px}
.loading{text-align:center;padding:80px 20px;color:var(--text-m)}
.spinner{display:inline-block;width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border-l);border-radius:var(--r);padding:10px 20px;font-size:13px;color:var(--text);z-index:999;transition:transform .3s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── SETTINGS BUTTON ── */
.btn-settings{border-color:var(--border-l)}
.btn-settings.connected{border-color:var(--buy);color:var(--buy)}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .stock-card{grid-template-columns:44px 1fr auto auto}
  .header-stats .stat-pill:nth-child(n+3){display:none}
  .updated-badge{display:none}
  .filter-select{max-width:120px;font-size:12px}
}
@media(max-width:400px){
  .stock-card{grid-template-columns:44px 1fr auto}
  .wl-btn{display:none}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Stock<span>Rater</span></div>
    <div class="header-stats">
      <div class="stat-pill"><span class="stat-dot buy"></span><span id="cnt-buy">–</span> Kauf</div>
      <div class="stat-pill"><span class="stat-dot watch"></span><span id="cnt-watch">–</span> Beob.</div>
      <div class="stat-pill"><span class="stat-dot sell"></span><span id="cnt-sell">–</span> Verk.</div>
    </div>
    <div class="updated-badge" id="updated-badge"></div>
  </div>
</header>

<div class="toolbar">
  <div class="search-wrap">
    <svg class="search-icon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="search" type="text" placeholder="Aktien suchen…" autocomplete="off">
  </div>
  <button class="btn" id="sort-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
    Sortieren
  </button>
  <button class="btn btn-wl" id="wl-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    Merkliste <span id="wl-count"></span>
  </button>

  
</div>

<div class="filter-row">
  <span class="filter-label">Empfehlung:</span>
  <button class="pill active" data-rec="all">Alle</button>
  <button class="pill buy"   data-rec="buy">Kauf</button>
  <button class="pill watch" data-rec="watch">Beobachten</button>
  <button class="pill sell"  data-rec="sell">Verkauf</button>
  <span class="filter-label" style="margin-left:8px">Börse:</span>
  <select class="filter-select" id="filter-exchange"><option value="">Alle Börsen</option></select>
  <span class="filter-label">Sektor:</span>
  <select class="filter-select" id="filter-sector"><option value="">Alle Sektoren</option></select>
</div>

<div class="results-info" id="results-info"></div>
<div class="stock-list"  id="stock-list"><div class="loading"><div class="spinner"></div><div>Lade Daten…</div></div></div>

<!-- SORT MODAL -->
<div class="modal-overlay" id="sort-modal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Sortieren</span><button class="modal-close" id="sort-close">✕</button></div>
    <div id="sort-opts">
      <div class="sort-option selected" data-sort="rating"><div class="sort-radio"></div>Empfehlung (Rating)</div>
      <div class="sort-option" data-sort="abstand"><div class="sort-radio"></div>Abstand (größter zuerst)</div>
      <div class="sort-option" data-sort="price_asc"><div class="sort-radio"></div>Kurs (aufsteigend)</div>
      <div class="sort-option" data-sort="price_desc"><div class="sort-radio"></div>Kurs (absteigend)</div>
      <div class="sort-option" data-sort="name"><div class="sort-radio"></div>Alphabet (A–Z)</div>
      <div class="sort-option" data-sort="marketcap"><div class="sort-radio"></div>Marktkapitalisierung</div>
      <div class="sort-option" data-sort="analyst_target"><div class="sort-radio"></div>Analysten-Kursziel (Upside %)</div>
    </div>
    <button class="modal-btn" id="sort-apply">Sortieren</button>
  </div>
</div>


<!-- DETAIL PANEL --><!-- DETAIL PANEL -->
<div class="detail-overlay" id="detail-overlay"></div>
<div class="detail-panel"  id="detail-panel"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let allStocks   = [];
let filtered    = [];
let watchlist   = JSON.parse(localStorage.getItem('sr-wl2') || '{}');
// Format: { "AAPL": { addedAt: "2026-01-01", note: "" } }

let customLocal = JSON.parse(localStorage.getItem('sr-custom') || '[]');
// Lokal hinzugefügte Aktien (werden beim Laden der JSON nicht überschrieben)

let sortKey     = 'rating';
let pendingSort = 'rating';
let recFilter   = 'all';
let exchFilter  = '';
let sectFilter  = '';
let searchQ     = '';
let showWL      = false;

// ═══════════════════════════════════════════
//  HILFSFUNKTIONEN
// ═══════════════════════════════════════════
function fmtEur(v) {
  if (v == null) return '–';
  const n = Number(v);
  if (n >= 1e12) return (n/1e12).toFixed(2) + ' Bio. €';
  if (n >= 1e9)  return (n/1e9).toFixed(1)  + ' Mrd. €';
  if (n >= 1e6)  return (n/1e6).toFixed(1)  + ' Mio. €';
  return n.toFixed(2) + ' €';
}
function fmtPrice(v) {
  if (v == null) return '–';
  return Number(v).toFixed(2) + ' €';
}
function fmtOrig(v, cur) {
  if (v == null || !cur) return '';
  const sym = {USD:'$',GBP:'£',CHF:'Fr.',JPY:'¥',HKD:'HK$',CAD:'C$',AUD:'A$',INR:'₹',NOK:'kr',SEK:'kr',DKK:'kr'}[cur] || cur;
  return `${sym} ${Number(v).toFixed(2)}`;
}
function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr)) / 86400000);
}
function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ═══════════════════════════════════════════
//  LADEN
// ═══════════════════════════════════════════
async function loadData() {
  try {
    // Relativer Pfad funktioniert für index.html und stocks.json im selben /docs Ordner
    const res = await fetch('stocks.json', { cache: 'no-cache' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    let raw = await res.text();
    let data;
    try {
      data = JSON.parse(raw);
    } catch(parseErr) {
      // JSON-Fehler: zeige hilfreiche Meldung
      console.error('JSON Parse Error:', parseErr.message);
      console.error('Erste 500 Zeichen:', raw.slice(0, 500));
      document.getElementById('stock-list').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div>
         <h3>Datenfehler in stocks.json</h3>
         <p>${parseErr.message}</p>
         <p style="font-size:12px;margin-top:8px;color:var(--text-s)">Bitte GitHub Actions erneut ausführen.</p></div>`;
      return;
    }
    allStocks  = data.stocks || [];

    if (data.metadata?.updatedAt) {
      const d = new Date(data.metadata.updatedAt);
      document.getElementById('updated-badge').textContent =
        d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' +
        d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    }

    // Lokal hinzugefügte Aktien ergänzen (die noch nicht in JSON sind)
    const jsonSymbols = new Set(allStocks.map(s => s.symbol));
    for (const cs of customLocal) {
      if (!jsonSymbols.has(cs.symbol)) allStocks.push(cs);
    }

    buildFilterOptions();
    updateStats();
    applyFilters();
  } catch(err) {
    console.error('loadData Fehler:', err);
    document.getElementById('stock-list').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div>
       <h3>Daten konnten nicht geladen werden</h3>
       <p>${err.message || 'Unbekannter Fehler'}</p>
       <p style="font-size:12px;margin-top:8px;color:var(--text-s)">
         Prüfe: <a href="stocks.json" style="color:var(--teal)">stocks.json direkt öffnen</a>
       </p></div>`;
  }
}

// ═══════════════════════════════════════════
//  FILTER-DROPDOWNS BEFÜLLEN
// ═══════════════════════════════════════════
function buildFilterOptions() {
  const exchanges = [...new Set(allStocks.map(s => s.exchange).filter(Boolean))].sort();
  const sectors   = [...new Set(allStocks.map(s => s.sector).filter(Boolean))].sort();
  const exSel = document.getElementById('filter-exchange');
  const seSel = document.getElementById('filter-sector');
  exSel.innerHTML = '<option value="">Alle Börsen</option>' +
    exchanges.map(e => `<option value="${e}">${e}</option>`).join('');
  seSel.innerHTML = '<option value="">Alle Sektoren</option>' +
    sectors.map(s => `<option value="${s}">${s}</option>`).join('');
}

//  STATS

function updateStats() {
  document.getElementById('cnt-buy').textContent   = allStocks.filter(s=>s.recommendation==='buy').length;
  document.getElementById('cnt-watch').textContent = allStocks.filter(s=>s.recommendation==='watch').length;
  document.getElementById('cnt-sell').textContent  = allStocks.filter(s=>s.recommendation==='sell').length;
  const wn = Object.keys(watchlist).length;
  document.getElementById('wl-count').textContent = wn > 0 ? `(${wn})` : '';
  document.getElementById('wl-btn').classList.toggle('has', wn > 0 || showWL);
  document.getElementById('wl-btn').classList.toggle('active', showWL);
}

// ═══════════════════════════════════════════
//  FILTER & SORT
// ═══════════════════════════════════════════
function applyFilters() {
  let pool = [...allStocks];

  if (showWL) {
    pool = pool.filter(s => watchlist[s.symbol]);
  } else {
    if (recFilter !== 'all') pool = pool.filter(s => s.recommendation === recFilter);
  }

  if (exchFilter) pool = pool.filter(s => s.exchange === exchFilter);
  if (sectFilter) pool = pool.filter(s => s.sector   === sectFilter);

  if (searchQ) {
    const q = searchQ.toLowerCase();
    pool = pool.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.symbol.toLowerCase().includes(q) ||
      (s.sector||'').toLowerCase().includes(q) ||
      (s.exchange||'').toLowerCase().includes(q)
    );
  }

  pool.sort((a,b) => {
    switch (sortKey) {
      case 'rating':     return (b.rating??-99)-(a.rating??-99);
      case 'abstand':    return (b.abstand??-1)-(a.abstand??-1);
      case 'price_asc':  return (a.price??0)-(b.price??0);
      case 'price_desc': return (b.price??0)-(a.price??0);
      case 'name':       return a.name.localeCompare(b.name,'de');
      case 'marketcap':  return (b.marketCap??0)-(a.marketCap??0);
      case 'analyst_target': {
        const ua = a.analyst?.upside ?? -999;
        const ub = b.analyst?.upside ?? -999;
        return ub - ua;
      }
      default: return 0;
    }
  });

  filtered = pool;
  renderList();
}

// ═══════════════════════════════════════════
//  RENDER LISTE
// ═══════════════════════════════════════════
function renderList() {
  const container = document.getElementById('stock-list');
  const info      = document.getElementById('results-info');

  const label = showWL ? ' in der Merkliste' :
    recFilter === 'buy'   ? ' Kaufempfehlungen' :
    recFilter === 'watch' ? ' zu beobachtende Aktien' :
    recFilter === 'sell'  ? ' Verkaufsempfehlungen' : '';
  info.innerHTML = `<strong>${filtered.length}</strong> Aktien${label}${searchQ?` für „${searchQ}"`:''}`;

  if (!filtered.length) {
    container.innerHTML = `<div class="empty">
      <div class="empty-icon">${showWL?'☆':'🔍'}</div>
      <h3>${showWL?'Merkliste ist leer':'Keine Aktien gefunden'}</h3>
      <p>${showWL?'Klicke auf ☆ bei einer Aktie.':'Versuche andere Suchbegriffe.'}</p>
    </div>`;
    return;
  }

  container.innerHTML = filtered.map(renderCard).join('');

  container.querySelectorAll('.stock-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.wl-btn')) return;
      openDetail(card.dataset.symbol);
    });
  });
  container.querySelectorAll('.wl-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); toggleWL(btn.dataset.symbol); });
  });
}

function renderCard(s) {
  const rec     = s.recommendation;
  const starred = !!watchlist[s.symbol];
  const rating  = s.rating > 0 ? `+${s.rating}` : `${s.rating}`;
  const arrow   = rec==='buy'?'↑':rec==='sell'?'↓':'·';

  // Abstand
  let abStr = '–', abCls = 'neu';
  if (s.abstand != null) {
    abStr = s.abstand.toFixed(1) + '%';
    abCls = s.abstand >= 10 ? 'pos' : s.abstand >= 5 ? 'neu' : 'neg';
  }

  // Analysten-Kursziel Badge
  let analystBadge = '';
  if (s.analyst && s.analyst.kursziel != null && s.analyst.upside != null) {
    const up = s.analyst.upside;
    const cls = up >= 5 ? 'up' : up <= -5 ? 'dn' : 'flat';
    const arrow = up >= 5 ? '↑' : up <= -5 ? '↓' : '→';
    analystBadge = `<span class="analyst-badge ${cls}" title="${s.analyst.anzahl} Analysten · Kursziel ${s.analyst.kursziel.toFixed(2)} €">${arrow} ${up > 0 ? '+' : ''}${up.toFixed(1)}% Ziel</span>`;
  }

  // Watchlist-Trend
  let trendHtml = '';
  if (starred && watchlist[s.symbol]) {
    const wl  = watchlist[s.symbol];
    const days = daysSince(wl.addedAt);
    const hist = s.priceHistory;
    if (hist && hist.length >= 2) {
      const first = hist.find(h => h.date >= (wl.addedAt||'0')) || hist[0];
      const last  = hist[hist.length-1];
      const pct   = ((last.price - first.price) / first.price * 100);
      const cls   = pct > 0 ? 'up' : pct < 0 ? 'dn' : 'flat';
      const icon  = pct > 0 ? '↑' : pct < 0 ? '↓' : '→';
      trendHtml = `<span class="trend-badge ${cls}">${icon} ${Math.abs(pct).toFixed(1)}%</span>`;
    }
    if (days != null) {
      trendHtml += `<span class="stock-sub" style="margin-left:4px">${days}d</span>`;
    }
  }

  return `<div class="stock-card ${rec}" data-symbol="${s.symbol}">
    <div class="rating-badge ${rec}">
      ${rating}
      <span class="badge-dot ${rec}">${arrow}</span>
    </div>
    <div class="stock-info">
      <div class="stock-name">${s.name}</div>
      <div class="stock-meta">
        <span class="stock-symbol">${s.symbol}</span>
        <span class="stock-sub">${s.exchange||''}</span>
        ${s.sector?`<span class="stock-sub">· ${s.sector}</span>`:''}
        ${trendHtml}
      </div>
    </div>
    <div class="card-right">
      <div class="metric-price">${fmtPrice(s.price)}</div>
      <div class="metric-label">Kurs (EUR)</div>
      <span class="abstand-badge ${abCls}">${abStr} Abst.</span>
      ${analystBadge}
    </div>
    <button class="wl-btn ${starred?'starred':''}" data-symbol="${s.symbol}">${starred?'★':'☆'}</button>
  </div>`;
}

// ═══════════════════════════════════════════
//  WATCHLIST
// ═══════════════════════════════════════════
function toggleWL(symbol) {
  if (watchlist[symbol]) {
    delete watchlist[symbol];
    toast('Von Merkliste entfernt');
  } else {
    watchlist[symbol] = { addedAt: new Date().toISOString().slice(0,10) };
    toast('Zur Merkliste hinzugefügt ★');
  }
  localStorage.setItem('sr-wl2', JSON.stringify(watchlist));
  updateStats();
  if (showWL) applyFilters(); else renderList();
}

document.getElementById('wl-btn').addEventListener('click', () => {
  showWL = !showWL;
  if (showWL) { recFilter='all'; document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active')); document.querySelector('[data-rec="all"]').classList.add('active'); }
  updateStats();
  applyFilters();
});

let helpVisible = false;

function openDetail(symbol) {
  const s = allStocks.find(x => x.symbol === symbol);
  if (!s) return;
  const rec     = s.recommendation;
  const rating  = s.rating > 0 ? `+${s.rating}` : `${s.rating}`;
  const recLabel = rec==='buy'?'✓ Kaufempfehlung':rec==='sell'?'✗ Verkaufsempfehlung':'~ Beobachten';
  const pct      = Math.max(0, Math.min(100, ((s.rating+12)/24)*100));
  const wlData   = watchlist[s.symbol];

  // Analysten-Section
  const a = s.analyst;
  let analystHtml = '';
  if (a && a.kursziel != null) {
    const up = a.upside;
    const upCls = up >= 5 ? 'up' : up <= -5 ? 'dn' : 'flat';
    const upStr = up != null ? `${up > 0 ? '+' : ''}${up.toFixed(1)}%` : '–';

    // Visualisierung: Balken von Tief bis Hoch, Punkt = aktueller Kurs, Linie = Ziel
    let barHtml = '';
    if (a.tief != null && a.hoch != null && s.price != null) {
      const lo = Math.min(a.tief, s.price) * 0.97;
      const hi = Math.max(a.hoch, s.price) * 1.03;
      const range = hi - lo;
      const pricePct  = ((s.price  - lo) / range * 100).toFixed(1);
      const zielPct   = ((a.kursziel - lo) / range * 100).toFixed(1);
      const tiefPct   = ((a.tief   - lo) / range * 100).toFixed(1);
      const hochPct   = ((a.hoch   - lo) / range * 100).toFixed(1);
      barHtml = `
        <div style="padding:0 0 8px">
          <div class="analyst-bar">
            <div class="analyst-bar-range" style="left:${tiefPct}%;width:${hochPct-tiefPct}%"></div>
            <div class="analyst-bar-dot" style="left:${pricePct}%" title="Kurs: ${s.price.toFixed(2)} €"></div>
          </div>
          <div class="analyst-bar-labels">
            <span>${a.tief?.toFixed(2)} € Tief</span>
            <span>▲ ${a.kursziel?.toFixed(2)} € Ziel</span>
            <span>${a.hoch?.toFixed(2)} € Hoch</span>
          </div>
        </div>`;
    }

    analystHtml = `
      <div class="analyst-section">
        <div class="section-title">Analysten-Konsens (${a.anzahl} Analysten)</div>
        ${barHtml}
        <div class="analyst-grid">
          <div class="analyst-item full">
            <div class="analyst-v ${upCls}">${a.kursziel?.toFixed(2)} € <span style="font-size:13px">(${upStr})</span></div>
            <div class="analyst-l">Gemischtes Kursziel · Konsens: ${a.konsens}</div>
          </div>
          <div class="analyst-item">
            <div class="analyst-v">${a.median?.toFixed(2) ?? '–'} €</div>
            <div class="analyst-l">Median-Kursziel</div>
          </div>
          <div class="analyst-item">
            <div class="analyst-v">${a.anzahl}</div>
            <div class="analyst-l">Anzahl Analysten</div>
          </div>
          <div class="analyst-item">
            <div class="analyst-v" style="color:var(--buy)">${a.hoch?.toFixed(2) ?? '–'} €</div>
            <div class="analyst-l">Höchstes Kursziel</div>
          </div>
          <div class="analyst-item">
            <div class="analyst-v" style="color:var(--sell)">${a.tief?.toFixed(2) ?? '–'} €</div>
            <div class="analyst-l">Niedrigstes Kursziel</div>
          </div>
          ${a.kurszielOrig != null && s.currency !== 'EUR' ? `
          <div class="analyst-item full">
            <div class="analyst-v" style="font-size:13px;color:var(--text-m)">${a.kurszielOrig?.toFixed(2)} ${s.currency}</div>
            <div class="analyst-l">Kursziel in Originalwährung</div>
          </div>` : ''}
        </div>
      </div>`;
  }

  // Kursverlauf
  const hist = s.priceHistory || [];
  const histHtml = hist.length ? `
    <div class="history-section">
      <div class="section-title">Kursverlauf (täglich, EUR)</div>
      <div class="history-toggle" id="hist-toggle">
        <span class="history-toggle-label">📈 ${hist.length} Einträge – klicken zum ${hist.length>1?'Öffnen':'Ansehen'}</span>
        <span class="history-chevron" id="hist-chevron">▼</span>
      </div>
      <div class="history-list" id="hist-list">
        ${[...hist].reverse().map(h => `
          <div class="history-item">
            <span class="history-date">${h.date}</span>
            <span class="history-price">${Number(h.price).toFixed(2)} €</span>
          </div>`).join('')}
      </div>
    </div>` : '';

  // Watchlist-Infos
  const wlHtml = wlData ? `
    <div class="ds" style="grid-column:span 3;background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.2)">
      <div class="ds-v" style="color:var(--gold)">★ In der Merkliste</div>
      <div class="ds-l">Beobachtet seit ${wlData.addedAt} (${daysSince(wlData.addedAt)} Tage)</div>
    </div>` : '';

  // Kennzahlen
  const kzHtml = Object.entries(s.details||{}).map(([key,d]) => {
    const cls   = d.score===1?'p1':d.score===-1?'m1':'z0';
    const label = d.score===1?'+1':d.score===-1?'−1':'0';
    const val   = d.value!=null ? `${Number(d.value).toFixed(2)}${d.unit}` : 'k.A.';
    const info  = KZ[key] || {label:key, help:''};
    return `<div class="kz-row">
      <div class="kz-score ${cls}">${label}</div>
      <div class="kz-info">
        <div class="kz-name">${info.label}</div>
        <div class="kz-value">${val}</div>
        <div class="kz-help help-text" style="display:none">${info.help}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('detail-panel').innerHTML = `
    <div class="detail-header">
      <div class="detail-badge ${rec}">${rating}</div>
      <div>
        <div class="detail-name">${s.name}</div>
        <div class="detail-sub">${s.symbol} · ${s.exchange||''} · ${s.sector||''}</div>
      </div>
      <button class="detail-close" id="detail-close">✕</button>
    </div>

    <div class="detail-stats">
      ${wlHtml}
      <div class="ds">
        <div class="ds-v">${fmtPrice(s.price)}</div>
        <div class="ds-l">Kurs (EUR)</div>
        <div class="ds-orig">${fmtOrig(s.priceOrig, s.currency)}</div>
      </div>
      <div class="ds">
        <div class="ds-v">${s.abstand!=null?s.abstand.toFixed(1)+'%':'–'}</div>
        <div class="ds-l">Abstand vom Hoch</div>
        <div class="ds-orig">${s.high52w!=null?s.high52w.toFixed(2)+' €':''} ${s.high52wOrig?'/ '+fmtOrig(s.high52wOrig,s.currency):''}</div>
      </div>
      <div class="ds">
        <div class="ds-v" style="color:var(--${rec==='buy'?'buy':rec==='sell'?'sell':'watch'})">${recLabel}</div>
        <div class="ds-l">Bewertung</div>
      </div>
      <div class="ds" style="grid-column:span 3">
        <div class="ds-v">${fmtEur(s.marketCap)}</div>
        <div class="ds-l">Marktkapitalisierung (EUR) ${s.currency&&s.currency!=='EUR'?'· Original: '+s.currency:''}</div>
      </div>
    </div>

    <div class="score-section">
      <div class="section-title">Rating-Score: ${rating} von max. +12</div>
      <div class="score-track"><div class="score-fill ${rec}" id="score-fill" style="width:0%"></div></div>
      <div class="score-labels"><span>−12</span><span>0</span><span>+12</span></div>
    </div>

    <div class="section-title" style="padding:0 20px 4px">Die 12 Kennzahlen</div>
    <div style="padding:0 20px 8px">
      <span class="help-toggle" id="help-toggle">💡 Erklärungen ${helpVisible?'ausblenden':'einblenden'}</span>
    </div>
    <div class="kz-list">${kzHtml}</div>

    ${analystHtml}
    ${histHtml}
  `;

  // Score-Bar animieren
  setTimeout(() => { const f=document.getElementById('score-fill'); if(f) f.style.width=pct+'%'; }, 60);

  // Hilfe-Toggle
  document.getElementById('help-toggle')?.addEventListener('click', () => {
    helpVisible = !helpVisible;
    document.querySelectorAll('.help-text').forEach(el => el.style.display = helpVisible?'block':'none');
    document.getElementById('help-toggle').textContent = `💡 Erklärungen ${helpVisible?'ausblenden':'einblenden'}`;
  });
  if (helpVisible) document.querySelectorAll('.help-text').forEach(el => el.style.display='block');

  // Verlauf-Toggle
  document.getElementById('hist-toggle')?.addEventListener('click', () => {
    const list = document.getElementById('hist-list');
    const chev = document.getElementById('hist-chevron');
    const open = list.classList.toggle('open');
    chev.classList.toggle('open', open);
  });

  document.getElementById('detail-close').addEventListener('click', closeDetail);
  document.getElementById('detail-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
}
document.getElementById('detail-overlay').addEventListener('click', closeDetail);

// ═══════════════════════════════════════════
//  SORT MODAL
// ═══════════════════════════════════════════
document.getElementById('sort-btn').addEventListener('click', () => {
  document.getElementById('sort-modal').classList.add('open');
  pendingSort = sortKey;
  document.querySelectorAll('.sort-option').forEach(o => o.classList.toggle('selected', o.dataset.sort===sortKey));
});
document.getElementById('sort-close').addEventListener('click', () => document.getElementById('sort-modal').classList.remove('open'));
document.getElementById('sort-modal').addEventListener('click', e => { if(e.target===e.currentTarget) e.currentTarget.classList.remove('open'); });
document.querySelectorAll('.sort-option').forEach(opt => opt.addEventListener('click', () => {
  document.querySelectorAll('.sort-option').forEach(o=>o.classList.remove('selected'));
  opt.classList.add('selected'); pendingSort = opt.dataset.sort;
}));
document.getElementById('sort-apply').addEventListener('click', () => {
  sortKey = pendingSort;
  document.getElementById('sort-modal').classList.remove('open');
  applyFilters();
});

// ═══════════════════════════════════════════
//  FILTER PILLS
// ═══════════════════════════════════════════
document.querySelectorAll('.pill').forEach(pill => pill.addEventListener('click', () => {
  document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');
  recFilter = pill.dataset.rec;
  showWL = false;
  updateStats();
  applyFilters();
}));
document.getElementById('filter-exchange').addEventListener('change', e => { exchFilter = e.target.value; applyFilters(); });
document.getElementById('filter-sector').addEventListener('change',   e => { sectFilter = e.target.value; applyFilters(); });

// ═══════════════════════════════════════════
//  SUCHE
// ═══════════════════════════════════════════
let searchTimer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQ = e.target.value.trim(); applyFilters(); }, 200);
});

// ═══════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeDetail(); ['sort-modal','add-modal','settings-modal'].forEach(id=>document.getElementById(id).classList.remove('open')); }
});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
updateStats();
loadData();
</script>
</body>
</html>
