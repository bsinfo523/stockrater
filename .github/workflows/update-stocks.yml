name: Aktien-Daten aktualisieren

on:
  schedule:
    - cron: '0 20 * * 1-5'   # Mo–Fr um 21:00 Uhr (nach Börsenschluss Europa)
  workflow_dispatch:           # Manuell ausführbar per Knopfdruck

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Abhängigkeiten installieren
        run: pip install yfinance pandas requests beautifulsoup4

      - name: Aktiendaten abrufen
        run: python scripts/fetch_stocks.py

      - name: Änderungen committen & pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/stocks.json
          git diff --staged --quiet || git commit -m "Daten: $(date '+%d.%m.%Y %H:%M')"
          git push
